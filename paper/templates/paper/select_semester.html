
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Semester | Question Paper Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: #eef2f7;
            font-family: Arial, sans-serif;
        }

        .page-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .app-card {
            width: 100%;
            max-width: 480px;
            border: 0;
            border-radius: 8px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
        }

        .brand-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: #0d6efd;
            color: #ffffff;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="page-shell">
        <div class="card app-card">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="brand-badge mb-3">QP</div>
                    <h1 class="h3 fw-bold mb-2">Select Semester</h1>
                    <p class="text-secondary mb-0">Choose a semester to view available subjects.</p>
                </div>

                <form method="POST" action="/subject/" class="needs-validation">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="semester" class="form-label fw-semibold">Semester</label>
                        <select id="semester" name="semester" class="form-select form-select-lg" required>
                            <option value="" selected disabled>Select semester</option>
                            <option value="1">Semester 1</option>
                            <option value="2">Semester 2</option>
                            <option value="3">Semester 3</option>
                            <option value="4">Semester 4</option>
                            <option value="5">Semester 5</option>
                            <option value="6">Semester 6</option>
                            <option value="7">Semester 7</option>
                            <option value="8">Semester 8</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100">Continue</button>
                </form>

                <div class="text-center mt-4">
                    <a href="/upload/" class="link-secondary text-decoration-none">Upload question bank</a>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
