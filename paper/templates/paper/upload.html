
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Questions | Question Paper Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: #eef2f7;
            font-family: Arial, sans-serif;
        }

        .page-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .app-card {
            width: 100%;
            max-width: 520px;
            border: 0;
            border-radius: 8px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
        }
    </style>
</head>
<body>
    <main class="page-shell">
        <div class="card app-card">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <span class="badge text-bg-primary mb-3">CSV Upload</span>
                    <h1 class="h3 fw-bold mb-2">Upload Questions</h1>
                    <p class="text-secondary mb-0">Add questions to the question bank from a CSV file.</p>
                </div>

                {% if msg %}
                    <div class="alert alert-info" role="alert">
                        {{ msg }}
                    </div>
                {% endif %}

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="file" class="form-label fw-semibold">CSV File</label>
                        <input id="file" type="file" name="file" class="form-control form-control-lg" accept=".csv" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100">Upload</button>
                </form>

                <div class="text-center mt-4">
                    <a href="/" class="link-secondary text-decoration-none">Back to generator</a>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
