
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Subject | Question Paper Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: #eef2f7;
            font-family: Arial, sans-serif;
        }

        .page-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .app-card {
            width: 100%;
            max-width: 560px;
            border: 0;
            border-radius: 8px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
        }
    </style>
</head>
<body>
    <main class="page-shell">
        <div class="card app-card">
            <div class="card-body p-4 p-md-5">
                <div class="mb-4 text-center">
                    <span class="badge text-bg-primary mb-3">Semester {{ semester }}</span>
                    <h1 class="h3 fw-bold mb-2">Select Subject</h1>
                    <p class="text-secondary mb-0">Set the question count and generate a balanced paper.</p>
                </div>

                <form method="POST" action="/paper/">
                    {% csrf_token %}
                    <input type="hidden" name="semester" value="{{ semester }}">

                    <div class="mb-4">
                        <label for="subject" class="form-label fw-semibold">Subject</label>
                        <select id="subject" name="subject" class="form-select form-select-lg" required>
                            <option value="" selected disabled>Select subject</option>
                            {% for subject in subjects %}
                                <option value="{{ subject.id }}">{{ subject.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="num_short" class="form-label fw-semibold">5 Mark Questions</label>
                            <input id="num_short" type="number" name="num_short" class="form-control form-control-lg" min="0" placeholder="5">
                        </div>
                        <div class="col-md-6">
                            <label for="num_long" class="form-label fw-semibold">10 Mark Questions</label>
                            <input id="num_long" type="number" name="num_long" class="form-control form-control-lg" min="0" placeholder="5">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100">Generate Paper</button>
                </form>

                <div class="d-flex justify-content-between align-items-center mt-4">
                    <a href="/" class="link-secondary text-decoration-none">Back to semester</a>
                    <a href="/upload/" class="link-secondary text-decoration-none">Upload questions</a>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
