<h2>Select Subject</h2>

<form method="POST" action="/paper/">
    {% csrf_token %}

    <input type="hidden" name="semester" value="{{ semester }}">

    <select name="subject">
        {% for subject in subjects %}
            <option value="{{ subject.id }}">{{ subject.name }}</option>
        {% endfor %}
    </select>

    <br><br>

    <input type="number" name="num_short" placeholder="5 mark questions">
    <input type="number" name="num_long" placeholder="10 mark questions">

    <br><br>

    <button type="submit">Generate Paper</button>
</form>
