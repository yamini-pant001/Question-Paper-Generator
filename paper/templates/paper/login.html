<h2>Admin Login</h2>

<form method="POST">
    {% csrf_token %}

    <label>Username:</label>
    <input type="text" name="username"><br><br>

    <label>Password:</label>
    <input type="password" name="password"><br><br>

    <button type="submit">Login</button>
</form>

{% if form.errors %}
<p style="color:red;">Invalid username or password</p>
{% endif %}
