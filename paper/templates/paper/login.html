<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Question Paper Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: #eef2f7;
            font-family: Arial, sans-serif;
        }

        .page-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .app-card {
            width: 100%;
            max-width: 460px;
            border: 0;
            border-radius: 8px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
        }
    </style>
</head>
<body>
    <main class="page-shell">
        <div class="card app-card">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <span class="badge text-bg-primary mb-3">Question Paper Generator</span>
                    <h1 class="h3 fw-bold mb-2">Login</h1>
                    <p class="text-secondary mb-0">Access your question paper workspace.</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <input id="username" type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <input id="password" type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
                </form>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
